worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ==================== Gzip Compression ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml
        font/opentype
        font/ttf
        font/eot
        font/otf;

    # ==================== Upstream ====================
    upstream app_backend {
        server app:3000;
        keepalive 32;
    }

    # ==================== HTTP Server (redirect to HTTPS) ====================
    server {
        listen 80;
        server_name _;

        # Allow health checks over HTTP
        location /api/health {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Redirect all other HTTP traffic to HTTPS (uncomment when SSL is configured)
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # ==================== Security Headers ====================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *; connect-src 'self' *; font-src 'self' data:; object-src 'none'; frame-ancestors 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Hide server version
        server_tokens off;

        # ==================== API Proxy ====================
        location /api/ {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;

            # Disable caching for API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ==================== Admin Frontend ====================
        location /admin/ {
            alias /app/admin/dist/;
            try_files $uri $uri/ /admin/index.html;

            # Cache static assets with hashed filenames
            location ~* /admin/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
                alias /app/admin/dist/;
                try_files $uri =404;
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ==================== H5 Frontend (default) ====================
        location / {
            root /app/dist;
            try_files $uri $uri/ /index.html;

            # Cache static assets with hashed filenames
            location ~* /assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
                root /app/dist;
                expires 7d;
                add_header Cache-Control "public, immutable";
            }

            # Cache images
            location ~* /img/.*\.(png|jpg|jpeg|gif|ico|webp|svg)$ {
                root /app/dist;
                expires 30d;
                add_header Cache-Control "public";
            }
        }

        # ==================== Deny Hidden Files ====================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

